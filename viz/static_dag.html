<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static DAG Viewer — Matrix Room</title>
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: #0f0f13;
        color: #e0e0e0;
        overflow: hidden;
        height: 100vh;
      }

      #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 100;
        backdrop-filter: blur(20px);
      }

      #header h1 {
        font-size: 15px;
        font-weight: 600;
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.3px;
      }

      #controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      #controls button,
      #controls label.btn {
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        padding: 5px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        cursor: pointer;
        transition: all 0.2s;
      }
        background: rgba(255, 255, 255, 0.04);
        color: #aaa;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-block;
      }
      #controls button:hover,
      #controls label.btn:hover {
        background: rgba(108, 92, 231, 0.2);
        border-color: #6c5ce7;
        color: #fff;
      }

      #tail-input {
        width: 60px;
        padding: 4px 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: #e0e0e0;
        text-align: center;
      }

      #cy {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0f0f13;
      }

      #legend {
        position: fixed;
        bottom: 16px;
        left: 16px;
        background: rgba(20, 20, 30, 0.92);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 12px 16px;
        z-index: 100;
        max-width: 280px;
        font-size: 11px;
        display: none;
      }

      #legend h3 {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #666;
        margin-bottom: 8px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #aaa;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      #tooltip {
        position: fixed;
        display: none;
        background: rgba(20, 20, 30, 0.95);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(108, 92, 231, 0.3);
        border-radius: 10px;
        padding: 12px 16px;
        z-index: 200;
        max-width: 420px;
        font-size: 12px;
        line-height: 1.6;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }

      #tooltip .tt-id {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: #6c5ce7;
        word-break: break-all;
      }

      #tooltip .tt-label {
        font-weight: 600;
        color: #fff;
        margin: 4px 0;
      }

      #tooltip .tt-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: #888;
      }

      #stats {
        position: fixed;
        bottom: 16px;
        right: 16px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #444;
        z-index: 100;
      }

      #overlay {
        position: fixed;
        top: 52px;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 19, 0.8);
        z-index: 50;
        transition: opacity 0.3s;
      }

      #overlay h2 {
        font-weight: 500;
        margin-bottom: 16px;
        color: #aaa;
      }

      #server-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 300;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
      }
      #server-form {
        background: #1a1a24;
        padding: 24px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #server-form h3 {
        margin-bottom: 8px;
        font-weight: 600;
      }
      #server-form input {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        font-family: "Inter", sans-serif;
      }
      #server-form button {
        padding: 8px 12px;
        border-radius: 6px;
        background: #6c5ce7;
        color: #fff;
        border: none;
        cursor: pointer;
        font-weight: 600;
        margin-top: 8px;
        transition: opacity 0.2s;
      }
      #server-form button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h1>⬡ Shared DAG Dashboard</h1>
      <div id="controls">
        <select
          id="room-select"
          style="
            display: none;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e0e0e0;
            font-family: &quot;Inter&quot;, sans-serif;
            font-size: 11px;
            padding: 5px 12px;
            outline: none;
          "
        ></select>
        <label class="btn">
          Load JSONL
          <input
            type="file"
            id="file-input"
            accept=".jsonl,.json"
            style="display: none"
          />
        </label>
        <label style="font-size: 11px; color: #666">Tail:</label>
        <input id="tail-input" type="number" value="100" min="10" max="5000" />
        <button id="btn-fit">Fit</button>
        <button id="btn-layout">Re-layout</button>
        <button id="btn-logout" style="display: none">Logout</button>
      </div>
    </div>

    <div id="overlay">
      <h2>Select or drop a Matrix JSONL file to visualize</h2>
    </div>

    <div id="server-modal">
      <div id="server-form">
        <h3>Connect to Matrix Server</h3>
        <input
          type="text"
          id="hs-input"
          placeholder="Homeserver URL (https://matrix.org)"
          value="https://matrix.wombatx.me"
        />
        <input
          type="password"
          id="token-input"
          placeholder="Access Token (syt_...)"
        />
        <button id="btn-login">Connect</button>
        <div
          id="login-error"
          style="
            color: #ff7675;
            font-size: 11px;
            display: none;
            margin-top: 4px;
          "
        ></div>
      </div>
    </div>

    <div id="cy"></div>
    <div id="legend"></div>
    <div id="tooltip"></div>
    <div id="stats"></div>

    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        document.getElementById("overlay").innerHTML +=
          `<div style="color:red; background: black; padding: 10px; z-index: 9999; margin-top: 20px;">ERROR: ${msg} <br> Line: ${lineNo}:${columnNo}</div>`;
        return false;
      };
      // Graph Data Logic
      const SERVER_COLORS = {};
      const PALETTE = [
        "#6c5ce7",
        "#00b894",
        "#e17055",
        "#0984e3",
        "#fdcb6e",
        "#e84393",
        "#00cec9",
        "#fab1a0",
        "#74b9ff",
        "#a29bfe",
        "#55efc4",
        "#ffeaa7",
        "#dfe6e9",
        "#fd79a8",
        "#636e72",
        "#81ecec",
        "#ff7675",
        "#b2bec3",
      ];

      function getServerColor(server) {
        if (!SERVER_COLORS[server]) {
          const idx = Object.keys(SERVER_COLORS).length % PALETTE.length;
          SERVER_COLORS[server] = PALETTE[idx];
        }
        return SERVER_COLORS[server];
      }

      function shortId(eid) {
        return eid && eid.length > 8 ? eid.substring(0, 8) : eid;
      }

      function getEventColor(ev) {
        const type = ev.type || "";
        if (type === "m.room.create") return "#2ecc71";
        if (type === "m.room.member") {
          const ms = (ev.content && ev.content.membership) || "";
          if (ms === "join") return "#3498db";
          if (ms === "leave") return "#e67e22";
          if (ms === "ban") return "#e74c3c";
          return "#9b59b6";
        }
        if (type === "m.room.message") return "#ecf0f1";
        if (type === "m.room.power_levels") return "#f39c12";
        if (type === "m.room.name") return "#1abc9c";
        return "#bdc3c7";
      }

      function buildGraphData(events, tail = 100) {
        if (!events || events.length === 0) return { nodes: [], edges: [] };

        // Sort by depth
        const sorted = [...events].sort(
          (a, b) => (a.depth || 0) - (b.depth || 0),
        );
        const windowEvents =
          sorted.length > tail ? sorted.slice(-tail) : sorted;

        const byId = {};
        windowEvents.forEach((e) => {
          if (e.event_id) byId[e.event_id] = e;
        });
        const idSet = new Set(Object.keys(byId));

        const nodes = [];
        const edges = [];

        windowEvents.forEach((ev) => {
          const eid = ev.event_id || "?";
          const sender = ev.sender || "";
          const server = sender.includes(":")
            ? sender.split(":")[1]
            : "unknown";
          const localpart = sender
            ? sender.split(":")[0].replace("@", "")
            : "?";
          const etype = (ev.type || "").replace("m.room.", "");
          const depth = ev.depth || 0;
          const ts = ev.origin_server_ts || 0;
          const content = ev.content || {};

          let label = "";
          if (ev.type === "m.room.member") {
            const membership = content.membership || "?";
            const sk = ev.state_key || "";
            const skLocal = sk ? sk.split(":")[0].replace("@", "") : "";
            label = `${membership}:${skLocal}`;
          } else if (ev.type === "m.room.message") {
            const body = (content.body || "").substring(0, 50);
            label = body ? `${localpart}: ${body}` : etype;
          } else if (ev.type === "m.room.name") {
            label = `name: ${content.name || "?"}`;
          } else {
            label = `${etype} (${localpart})`;
          }

          let tsStr = "";
          if (ts) {
            const dt = new Date(ts);
            tsStr = dt.toISOString().split("T")[1].split(".")[0];
          }

          const prevEvents =
            ev.prev_events || (ev.unsigned && ev.unsigned.prev_events) || [];

          nodes.push({
            data: {
              id: eid,
              label: label,
              short_id: shortId(eid),
              depth: depth,
              sender: sender,
              localpart: localpart,
              server: server,
              type: ev.type || "",
              short_type: etype,
              ts: tsStr,
              ts_ms: ts,
              color: getEventColor(ev),
              border_color: getServerColor(server),
              n_prev: prevEvents.length,
              full_id: eid,
            },
          });

          prevEvents.forEach((prev) => {
            if (idSet.has(prev)) {
              edges.push({ data: { source: prev, target: eid } });
            } else {
              const ghostId = `ghost_${prev}`;
              nodes.push({
                data: {
                  id: ghostId,
                  label: shortId(prev),
                  short_id: shortId(prev),
                  depth: depth - 1,
                  sender: "",
                  server: "external",
                  type: "external",
                  short_type: "ext",
                  ts: "",
                  color: "#555",
                  border_color: "#333",
                  n_prev: 0,
                  ghost: true,
                  full_id: prev,
                },
              });
              edges.push({ data: { source: ghostId, target: eid } });
            }
          });
        });

        // Deduplicate nodes (ghosts)
        const seenIds = new Set();
        const dedupedNodes = [];
        nodes.forEach((n) => {
          if (!seenIds.has(n.data.id)) {
            seenIds.add(n.data.id);
            dedupedNodes.push(n);
          }
        });

        // Legend
        const serversSeen = Array.from(
          new Set(
            dedupedNodes
              .filter(
                (n) =>
                  n.data.server !== "external" && n.data.server !== "unknown",
              )
              .map((n) => n.data.server),
          ),
        ).sort();

        const legend = {};
        serversSeen.forEach((s) => (legend[s] = getServerColor(s)));

        const depths = dedupedNodes
          .filter((n) => !n.data.ghost)
          .map((n) => n.data.depth);
        const depthRange = depths.length
          ? `${Math.min(...depths)}..${Math.max(...depths)}`
          : "?";
        const eventCount = dedupedNodes.filter((n) => !n.data.ghost).length;

        return {
          nodes: dedupedNodes,
          edges,
          legend,
          depthRange,
          eventCount,
        };
      }

      // Cytoscape Setup
      const cy = cytoscape({
        container: document.getElementById("cy"),
        style: [
          {
            selector: "node",
            style: {
              label: "data(short_id)",
              "text-valign": "center",
              "text-halign": "center",
              "font-size": "8px",
              "font-family": '"JetBrains Mono", monospace',
              color: "#ddd",
              "text-outline-color": "data(color)",
              "text-outline-width": 1.5,
              "background-color": "data(color)",
              "border-color": "data(border_color)",
              "border-width": 3,
              width: 60,
              height: 28,
              shape: "round-rectangle",
              "text-wrap": "ellipsis",
              "text-max-width": "54px",
            },
          },
          {
            selector: "node[?ghost]",
            style: {
              "background-color": "#1a1a24",
              "border-style": "dashed",
              "border-color": "#333",
              "border-width": 1.5,
              opacity: 0.5,
              width: 40,
              height: 20,
              "font-size": "7px",
            },
          },
          {
            selector: "node[n_prev > 1]",
            style: {
              "border-width": 4,
              width: 70,
            },
          },
          {
            selector: "edge",
            style: {
              width: 1.5,
              "line-color": "rgba(120,120,150,0.3)",
              "target-arrow-color": "rgba(120,120,150,0.4)",
              "target-arrow-shape": "triangle",
              "curve-style": "bezier",
              "arrow-scale": 0.6,
            },
          },
          {
            selector: ":selected",
            style: {
              "border-color": "#fff",
              "border-width": 4,
            },
          },
        ],
        layout: { name: "preset" },
        minZoom: 0.1,
        maxZoom: 4,
        wheelSensitivity: 0.3,
      });

      // Tooltip logic
      const tooltip = document.getElementById("tooltip");
      cy.on("mouseover", "node", (e) => {
        const d = e.target.data();
        if (d.ghost) return;
        tooltip.innerHTML = `
    <div class="tt-id">${d.full_id}</div>
    <div class="tt-label">${escapeHtml(d.label)}</div>
    <div class="tt-meta">
      depth: ${d.depth} &middot; ${d.ts}<br>
      sender: ${d.sender}<br>
      type: ${d.type}<br>
      prev_events: ${d.n_prev}
    </div>
  `;
        tooltip.style.display = "block";
        const pos = e.renderedPosition || e.target.renderedPosition();
        const ttRect = tooltip.getBoundingClientRect();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let left = pos.x + 20;
        let top = pos.y + 60;
        // Flip left if overflowing right edge
        if (left + ttRect.width > vw) left = pos.x - ttRect.width - 10;
        // Flip up if overflowing bottom edge
        if (top + ttRect.height > vh) top = pos.y - ttRect.height - 10;
        tooltip.style.left = left + "px";
        tooltip.style.top = top + "px";
      });
      cy.on("mouseout", "node", () => {
        tooltip.style.display = "none";
      });

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // App State
      let ALL_EVENTS = [];

      function updateGraph() {
        if (ALL_EVENTS.length === 0) return;

        document.getElementById("overlay").style.display = "none";

        const tail =
          parseInt(document.getElementById("tail-input").value) || 100;
        const data = buildGraphData(ALL_EVENTS, tail);
        const elements = [...data.nodes, ...data.edges];

        cy.batch(() => {
          cy.elements().remove();
          cy.add(elements);
        });

        cy.layout({
          name: "dagre",
          rankDir: "TB",
          nodeSep: 15,
          rankSep: 40,
          edgeSep: 8,
          animate: false,
          fit: true,
          padding: 30,
        }).run();

        const legendEl = document.getElementById("legend");
        if (data.legend && Object.keys(data.legend).length > 0) {
          let html = "<h3>Servers</h3>";
          for (const [server, color] of Object.entries(data.legend)) {
            html += `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${server}</div>`;
          }
          legendEl.innerHTML = html;
          legendEl.style.display = "block";
        } else {
          legendEl.style.display = "none";
        }

        document.getElementById("stats").textContent =
          `${data.eventCount} events \xB7 depth ${data.depthRange}`;
      }

      // File loading
      function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          const lines = text.split("\n");
          const events = [];
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              events.push(JSON.parse(line));
            } catch (err) {
              // ignore bad lines
            }
          }
          ALL_EVENTS = events;
          updateGraph();
        };
        reader.readAsText(file);
      }

      document.getElementById("file-input").addEventListener("change", (e) => {
        if (e.target.files.length > 0) handleFile(e.target.files[0]);
      });

      document.addEventListener("dragover", (e) => e.preventDefault());
      document.addEventListener("drop", (e) => {
        e.preventDefault();
        if (e.dataTransfer.files.length > 0) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      // Controls
      document.getElementById("btn-fit").onclick = () => cy.fit(null, 30);
      document.getElementById("btn-layout").onclick = () => {
        cy.layout({
          name: "dagre",
          rankDir: "TB",
          nodeSep: 15,
          rankSep: 40,
          animate: true,
          animationDuration: 300,
          fit: true,
          padding: 30,
        }).run();
      };
      document.getElementById("tail-input").onchange = updateGraph;

      // Authentication and Sync Logic
      let liveInterval = null;
      let currentRoomId = null;

      function getAuth() {
        let hs = null;
        let token = null;
        try { hs = localStorage.getItem("hs_url") || getCookie("hs_url"); } catch (e) {}
        try { token = localStorage.getItem("access_token") || getCookie("access_token"); } catch (e) {}
        if (hs && !hs.startsWith("http")) hs = "https://" + hs;
        return { hs, token };
      }

      function setAuth(hs, token) {
        try {
          localStorage.setItem("hs_url", hs);
          localStorage.setItem("access_token", token);
          document.cookie = `hs_url=${hs}; path=/; max-age=2592000`;
          document.cookie = `access_token=${token}; path=/; max-age=2592000`;
        } catch (e) {
          console.warn("Storage not available", e);
        }
      }

      function clearAuth() {
        try {
          localStorage.removeItem("hs_url");
          localStorage.removeItem("access_token");
          document.cookie = "hs_url=; path=/; max-age=0";
          document.cookie = "access_token=; path=/; max-age=0";
        } catch (e) {}
      }

      function getCookie(name) {
        try {
          const v = document.cookie.match("(^|;) ?" + name + "=([^;]*)(;|$)");
          return v ? v[2] : null;
        } catch (e) {
          return null;
        }
      }

      function showLogin() {
        document.getElementById("server-modal").style.display = "flex";
        document.getElementById("room-select").style.display = "none";
        document.getElementById("btn-logout").style.display = "none";
        if (liveInterval) clearInterval(liveInterval);
      }

      async function handleLogin() {
        let hs = document.getElementById("hs-input").value.replace(/\/$/, "");
        const token = document.getElementById("token-input").value.trim();
        const errEl = document.getElementById("login-error");

        if (!hs || !token) {
          errEl.textContent = "Please fill in all fields";
          errEl.style.display = "block";
          return;
        }
        
        if (!hs.startsWith("http")) {
          hs = "https://" + hs;
        }

        const btn = document.getElementById("btn-login");
        btn.textContent = "Connecting...";
        btn.disabled = true;

        try {
          // Perform .well-known discovery if possible
          try {
            const wkRes = await fetch(`${hs}/.well-known/matrix/client`);
            if (wkRes.ok) {
              const wkData = await wkRes.json();
              if (wkData && wkData["m.homeserver"] && wkData["m.homeserver"].base_url) {
                hs = wkData["m.homeserver"].base_url.replace(/\/$/, "");
              }
            }
          } catch (wkErr) {
            console.log("No .well-known discovery found, using provided URL.");
          }

          // Verify token by fetching joined rooms
          const res = await fetch(`${hs}/_matrix/client/v3/joined_rooms?access_token=${token}`);
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || "Invalid token or homeserver");
          }

          setAuth(hs, token);
          document.getElementById("server-modal").style.display = "none";
          errEl.style.display = "none";
          await loadRooms();
        } catch (e) {
          errEl.textContent = e.message;
          errEl.style.display = "block";
        } finally {
          btn.textContent = "Connect";
          btn.disabled = false;
        }
      }

      document.getElementById("btn-login").onclick = handleLogin;
      document.getElementById("btn-logout").onclick = () => {
        clearAuth();
        showLogin();
      };

      async function loadRooms() {
        const { hs, token } = getAuth();
        if (!hs || !token) return;

        try {
          const res = await fetch(`${hs}/_matrix/client/v3/joined_rooms?access_token=${token}`);
          if (res.status === 401) {
            clearAuth();
            showLogin();
            return;
          }
          if (!res.ok) throw new Error("Failed to fetch joined_rooms");
          const data = await res.json();
          const joinedRooms = data.joined_rooms || [];

          const select = document.getElementById("room-select");
          select.innerHTML = '<option value="">-- Select a Room --</option>';

          // Sort room IDs alphabetically
          joinedRooms.sort((a, b) => a.localeCompare(b));

          joinedRooms.forEach((roomId) => {
            const opt = document.createElement("option");
            opt.value = roomId;
            opt.textContent = roomId; // For forensic DAG analysis, Room IDs are perfect
            select.appendChild(opt);
          });

          select.style.display = "inline-block";
          document.getElementById("btn-logout").style.display = "inline-block";

          select.onchange = (e) => {
            currentRoomId = e.target.value;
            if (currentRoomId) {
              startSharedSync();
            } else {
              if (liveInterval) clearInterval(liveInterval);
              document.getElementById("overlay").style.display = "flex";
              cy.elements().remove();
            }
          };
        } catch (err) {
          console.error(`Failed to load rooms from ${hs}`, err);
          const errEl = document.getElementById("login-error");
          if (errEl) {
            errEl.textContent = `Failed to load rooms from ${hs}: ` + err.message;
            errEl.style.display = "block";
            clearAuth(); // wipe the bad state so they aren't stuck
            showLogin();
          }
        }
      }

      function startSharedSync() {
        document.getElementById("overlay").style.display = "none";
        if (liveInterval) clearInterval(liveInterval);

        const fetchDag = async () => {
          if (!currentRoomId) return;
          const { hs, token } = getAuth();
          if (!hs || !token) return;

          try {
            const tail =
              parseInt(document.getElementById("tail-input").value) || 100;
            const eventId = document.getElementById("event-input").value.trim();

            if (eventId) {
              const res = await fetch(
                `${hs}/_matrix/client/v3/rooms/${encodeURIComponent(currentRoomId)}/context/${encodeURIComponent(eventId)}?limit=${tail}&access_token=${token}`
              );
              if (!res.ok) throw new Error(await res.text());
              const data = await res.json();
              
              ALL_EVENTS = [
                ...(data.events_before || []),
                data.event,
                ...(data.events_after || [])
              ].filter(Boolean);
              
              if (data.state) {
                ALL_EVENTS = ALL_EVENTS.concat(data.state);
              }
            } else {
              const res = await fetch(
                `${hs}/_matrix/client/v3/rooms/${encodeURIComponent(currentRoomId)}/messages?dir=b&limit=${tail}&access_token=${token}`
              );
              if (!res.ok) throw new Error(await res.text());
              const data = await res.json();

              ALL_EVENTS = data.chunk || [];
              if (data.state) {
                ALL_EVENTS = ALL_EVENTS.concat(data.state);
              }
            }

            updateGraph();
            document.getElementById("stats").textContent += " (Live)";
          } catch (err) {
            console.error(err);
            document.getElementById("stats").textContent =
              "Sync Error: " + err.message;
          }
        };

        fetchDag();
        liveInterval = setInterval(fetchDag, 5000);
      }

      window.onload = () => {
        const { hs, token } = getAuth();
        if (!hs || !token) {
          showLogin();
        } else {
          loadRooms();
        }
      };
    </script>
  </body>
</html>
